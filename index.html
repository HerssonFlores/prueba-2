<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL PICHON</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f0f0f;
  color: white;
}

/* NAV */
.nav {
  position: fixed;
  width: 100%;
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.6);
  padding: 15px 30px;
  z-index: 1000;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
              url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092');
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

.hero h1 { font-size: 50px; }
.hero p { font-size: 20px; opacity: 0.8; }

/* BOTÓN */
.btn {
  background: linear-gradient(45deg, #ff416c, #ff4b2b);
  padding: 12px 20px;
  border-radius: 30px;
  color: white;
  text-decoration: none;
  cursor: pointer;
  display: inline-block;
  margin-top: 10px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(255,65,108,0.6);
}

/* SECCIÓN */
.section {
  padding: 80px 20px;
  text-align: center;
}

/* MENU */
.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.item {
  width: 220px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  transition: 0.3s;
}

.item:hover { transform: scale(1.05); }

.item.selected {
  border: 2px solid #ff416c;
  box-shadow: 0 0 15px rgba(255,65,108,0.5);
}

/* FORM */
.form {
  max-width: 400px;
  margin: auto;
  text-align: left;
}

/* EXTRAS */
.extras-box {
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 10px;
}

.extra-item {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

/* TOTAL */
.total {
  font-size: 20px;
  color: #00ff99;
}

/* CARRITO */
.carrito {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 10px;
  margin-top: 20px;
  animation: fadeIn 0.5s;
}
</style>
</head>

<body>

<div class="nav">
  <h2>🔥 EL PICHON</h2>
</div>

<section class="hero">
  <div>
    <h1>EL PICHON</h1>
    <p>🔥 Sabor que te hace volver 🔥</p>
    <a class="btn" href="#menu">Ordenar ahora</a>
  </div>
</section>

<section class="section" id="menu">
  <h2>Menú</h2>

  <div class="menu">
    <div class="item" onclick="seleccionar(this,'Hamburguesa',120)">Hamburguesa $120</div>
    <div class="item" onclick="seleccionar(this,'Pizza',150)">Pizza $150</div>
    <div class="item" onclick="seleccionar(this,'Tacos',80)">Tacos $80</div>
    <div class="item" onclick="seleccionar(this,'Alitas',140)">Alitas $140</div>
  </div>

  <div class="form">

    <h3>Cantidad</h3>
    <input type="number" id="cantidad" value="1" min="1" onchange="calcular()" style="width:100%; padding:10px; border-radius:8px;">

    <div id="extras"></div>

    <h3>Entrega</h3>
    <label><input type="radio" name="envio" value="A domicilio" onchange="toggleDireccion()"> A domicilio</label>
    <label><input type="radio" name="envio" value="Recoger" onchange="toggleDireccion()"> Recoger</label>

    <div id="direccionBox">
      <input type="text" id="direccion" placeholder="Dirección" style="width:100%; padding:10px;">
    </div>

    <div class="total" id="total">Total: $0</div>

    <a class="btn" onclick="agregarCarrito()">Agregar al carrito</a>
    <a class="btn" onclick="enviarPedido()">Enviar pedido</a>

    <div class="carrito" id="carrito"></div>

  </div>
</section>

<!-- SONIDO -->
<audio id="sonido" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
let carrito = [];
let producto = "";
let precioBase = 0;

let extrasData = {
  "Hamburguesa": [
    {nombre:"Queso extra", precio:20},
    {nombre:"Bacon", precio:30},
    {nombre:"Aguacate", precio:25},
    {nombre:"Doble carne", precio:50},
    {nombre:"Papas", precio:40},
    {nombre:"Refresco", precio:25}
  ],
  "Pizza": [
    {nombre:"Extra queso", precio:25},
    {nombre:"Pepperoni", precio:35},
    {nombre:"Champiñones", precio:20},
    {nombre:"Orilla rellena", precio:40},
    {nombre:"Refresco", precio:25}
  ],
  "Tacos": [
    {nombre:"Queso", precio:15},
    {nombre:"Guacamole", precio:20},
    {nombre:"Doble tortilla", precio:10},
    {nombre:"Refresco", precio:25}
  ],
  "Alitas": [
    {nombre:"BBQ", precio:15},
    {nombre:"Buffalo", precio:15},
    {nombre:"Extra salsa", precio:10},
    {nombre:"Papas", precio:40},
    {nombre:"Refresco", precio:25}
  ]
};

function seleccionar(el,nombre,precio){
  document.querySelectorAll('.item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
  producto=nombre;
  precioBase=precio;
  mostrarExtras(nombre);
  calcular();
}

function mostrarExtras(nombre){
  let cont = document.getElementById("extras");
  cont.innerHTML = "<h3>Extras</h3><div class='extras-box'></div>";

  let box = cont.querySelector(".extras-box");

  extrasData[nombre].forEach(e => {
    box.innerHTML += `
      <label class="extra-item">
        <span>
          <input type="checkbox" value="${e.nombre}" data-precio="${e.precio}" onchange="calcular()">
          ${e.nombre}
        </span>
        <span>+$${e.precio}</span>
      </label>
    `;
  });
}

function calcular(){
  let cantidad=document.getElementById("cantidad").value;
  let extras=document.querySelectorAll('#extras input:checked');
  let total=precioBase*cantidad;

  extras.forEach(e=> total+=parseInt(e.dataset.precio));

  document.getElementById("total").innerText="Total: $"+total;
}

function agregarCarrito(){
  document.getElementById("sonido").play();

  let total=document.getElementById("total").innerText;
  carrito.push(producto+" - "+total);
  mostrarCarrito();
}

function mostrarCarrito(){
  let cont=document.getElementById("carrito");
  cont.innerHTML="<h3>Carrito</h3>";
  carrito.forEach(p=> cont.innerHTML+= "<p>"+p+"</p>");
}

function toggleDireccion(){
  let envio=document.querySelector('input[name="envio"]:checked').value;
  document.getElementById("direccionBox").style.display =
    envio==="A domicilio"?"block":"none";
}

function enviarPedido(){
  let mensaje="🔥 Pedido EL PICHON 🔥%0A";
  carrito.forEach(p=> mensaje+=p+"%0A");

  window.open("https://wa.me/5215528716239?text="+mensaje);
}
</script>

</body>
</html>
